<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Murena - Win95 Infected Screensaver (Final Boss Edition)</title>
    
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #000000; 
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden; 
        }

        #crt-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 900; pointer-events: none;
            background: 
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.05));
            background-size: 100% 4px, 4px 100%;
            animation: flicker 0.15s infinite;
        }

        @keyframes flicker {
            0% { opacity: 0.95; }
            50% { opacity: 1; }
            100% { opacity: 0.98; }
        }

        #crt-vignette {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 901; pointer-events: none;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.9);
        }

        canvas {
            display: block; width: 100%; height: 100%; z-index: 10;
        }
    </style>
</head>
<body>

    <div id="crt-overlay"></div>
    <div id="crt-vignette"></div>
    <canvas id="visualizer"></canvas>

    <script>
        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- CARICAMENTO ASSET DEL GLITCH SEPARATI ---
        // 1. Famiglia Boss
        const bossImageNames = ['ai-boss-talk.png', 'ai-boss-angry.png'];
        const bossImages = [];
        bossImageNames.forEach(name => {
            let img = new Image(); img.src = 'assets/' + name; bossImages.push(img);
        });

        // 2. Famiglia Murene
        const murenaImageNames = ['murena-idle.png', 'murena-jump.png', 'murena-attack.png', 'murena-walk.png', 'murena-run.png'];
        const murenaImages = [];
        murenaImageNames.forEach(name => {
            let img = new Image(); img.src = 'assets/' + name; murenaImages.push(img);
        });

        // --- GESTIONE LOGO "DVD" BOUNCING ---
        const logoImg = new Image();
        logoImg.src = 'assets/logo-studiomurena.png'; 
        
        let logo = {
            x: 100, y: 100, width: 0, height: 0,
            dx: 3.5, dy: 3.5, hue: 0, isGlitching: false, scale: 0.36
        };

        const logoTints = {};

        function getTintedLogo(hue) {
            if (logoTints[hue]) return logoTints[hue];
            const tCanvas = document.createElement('canvas');
            const tCtx = tCanvas.getContext('2d');
            tCanvas.width = logoImg.width; tCanvas.height = logoImg.height;
            
            tCtx.drawImage(logoImg, 0, 0);
            tCtx.globalCompositeOperation = 'source-in';
            tCtx.fillStyle = `hsl(${hue}, 100%, 60%)`;
            tCtx.fillRect(0, 0, tCanvas.width, tCanvas.height);
            
            logoTints[hue] = tCanvas;
            return tCanvas;
        }

        logoImg.onload = () => {
            logo.width = logoImg.width * logo.scale;
            logo.height = logoImg.height * logo.scale;
            logo.x = Math.random() * (canvas.width - logo.width);
            logo.y = Math.random() * (canvas.height - logo.height);
        };

        // --- LA MURENA 3D PIPES ---
        const pipeRadius = 35;
        const pipeSpeed = 9;
        
        class MurenaPipe {
            constructor() {
                this.x = canvas.width / 2; this.y = canvas.height / 2;
                this.history = []; this.maxLength = 150; 
                this.dir = Math.floor(Math.random() * 4);
                this.targetSteps = this.getRandomSteps();
                this.currentSteps = 0;
            }

            getRandomSteps() { return Math.floor(Math.random() * 40) + 15; }

            update() {
                this.history.unshift({ x: this.x, y: this.y });
                if (this.history.length > this.maxLength) this.history.pop();

                if (this.dir === 0) this.y -= pipeSpeed;
                if (this.dir === 1) this.x += pipeSpeed;
                if (this.dir === 2) this.y += pipeSpeed;
                if (this.dir === 3) this.x -= pipeSpeed;

                this.currentSteps++;
                if (this.currentSteps >= this.targetSteps) {
                    this.currentSteps = 0;
                    this.targetSteps = this.getRandomSteps();
                    let turn = Math.random() > 0.5 ? 1 : -1;
                    this.dir = (this.dir + turn + 4) % 4;
                }

                if (this.x < -pipeRadius) this.x = canvas.width + pipeRadius;
                if (this.x > canvas.width + pipeRadius) this.x = -pipeRadius;
                if (this.y < -pipeRadius) this.y = canvas.height + pipeRadius;
                if (this.y > canvas.height + pipeRadius) this.y = -pipeRadius;
            }

            draw() {
                for (let i = this.history.length - 1; i >= 0; i--) {
                    let p = this.history[i];
                    let life = 1 - (i / this.history.length);
                    let currentRadius = pipeRadius * (0.3 + 0.7 * life);

                    let grad = ctx.createRadialGradient(p.x - currentRadius*0.3, p.y - currentRadius*0.3, currentRadius*0.1, p.x, p.y, currentRadius);
                    grad.addColorStop(0, '#ccff00'); 
                    grad.addColorStop(0.3, '#8a2be2'); 
                    grad.addColorStop(1, '#110022'); 

                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, currentRadius, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        let murena = new MurenaPipe();

        // --- SISTEMA SALVASCHERMO ---
        function updateLogo() {
            if (logo.width === 0) return;

            logo.x += logo.dx; logo.y += logo.dy;
            let hitWall = false;

            if (logo.x <= 0 || logo.x + logo.width >= canvas.width) {
                logo.dx *= -1; logo.x = Math.max(0, Math.min(logo.x, canvas.width - logo.width)); hitWall = true;
            }
            if (logo.y <= 0 || logo.y + logo.height >= canvas.height) {
                logo.dy *= -1; logo.y = Math.max(0, Math.min(logo.y, canvas.height - logo.height)); hitWall = true;
            }

            if (hitWall) logo.hue = (logo.hue + 75) % 360; 

            let centerX = logo.x + logo.width / 2; let centerY = logo.y + logo.height / 2;
            let dist = Math.hypot(centerX - murena.x, centerY - murena.y);
            logo.isGlitching = (dist < 250); 
        }

        function drawLogo() {
            if (logo.width === 0) return;
            let tinted = getTintedLogo(logo.hue);

            if (logo.isGlitching) {
                let shiftX = (Math.random() - 0.5) * 40; let shiftY = (Math.random() - 0.5) * 40;
                ctx.globalCompositeOperation = 'screen'; 
                ctx.globalAlpha = 0.8;
                ctx.shadowColor = "red"; ctx.shadowBlur = 15;
                ctx.drawImage(getTintedLogo(0), logo.x + shiftX - 15, logo.y + shiftY, logo.width, logo.height);
                ctx.shadowColor = "cyan"; ctx.shadowBlur = 15;
                ctx.drawImage(getTintedLogo(180), logo.x - shiftX + 15, logo.y - shiftY, logo.width, logo.height);
                ctx.globalCompositeOperation = 'source-over'; 
                ctx.globalAlpha = 1.0; ctx.shadowBlur = 0;
            } else {
                ctx.shadowBlur = 20; ctx.shadowColor = `hsl(${logo.hue}, 100%, 50%)`;
                ctx.drawImage(tinted, logo.x, logo.y, logo.width, logo.height);
                ctx.shadowBlur = 0;
            }
        }

        // --- SISTEMA GLITCH EVENT (Boss Sparsi o Cascata Murene) ---
        let globalGlitchFrames = 0;
        let activeGlitchMode = null; // 'boss' o 'murena'
        let glitchArray = [];
        let targetGlitchImg = null;
        let spriteAnimFrame = 0;
        let cascadeX = 0, cascadeY = 0;

        function triggerGlobalGlitch() {
            // Molto raro: circa 0.2% a frame -> scatta ogni tot secondi, come intercettore
            if (globalGlitchFrames === 0 && Math.random() > 0.998) { 
                
                // Durata Random: 2, 3 o 4 secondi (a 60fps = 120, 180, 240 frames)
                let duratePossibili = [120, 180, 240];
                globalGlitchFrames = duratePossibili[Math.floor(Math.random() * duratePossibili.length)];
                
                glitchArray = [];
                
                // Lancia la monetina: Boss Sparsi (40%) o Murena a Cascata (60%)
                if (Math.random() > 0.6) {
                    // --- MODO BOSS: Sparsi a spot (4-8 istanze) ---
                    activeGlitchMode = 'boss';
                    targetGlitchImg = bossImages[Math.floor(Math.random() * bossImages.length)];
                    let numberOfBosses = Math.floor(Math.random() * 5) + 4; // Da 4 a 8
                    
                    for (let i = 0; i < numberOfBosses; i++) {
                        glitchArray.push({
                            x: Math.random() * (canvas.width - 256),
                            y: Math.random() * (canvas.height - 256)
                        });
                    }
                } else {
                    // --- MODO MURENA: Cascata trascinata ---
                    activeGlitchMode = 'murena';
                    targetGlitchImg = murenaImages[Math.floor(Math.random() * murenaImages.length)];
                    cascadeX = Math.random() * (canvas.width / 2);
                    cascadeY = Math.random() * (canvas.height / 2) - 100;
                }
            }

            if (globalGlitchFrames > 0) {
                globalGlitchFrames--;

                // Gestisce l'animazione della spritesheet (15 fps circa)
                if (globalGlitchFrames % 4 === 0) spriteAnimFrame = (spriteAnimFrame + 1) % 25;

                // Solo in Modalità Murena generiamo le copie a cascata "in movimento"
                if (activeGlitchMode === 'murena') {
                    if (globalGlitchFrames % 3 === 0 && targetGlitchImg && targetGlitchImg.complete) {
                        glitchArray.push({ x: cascadeX, y: cascadeY });
                        cascadeX += 80; cascadeY += 50;
                        
                        // Se sbatte sui bordi, riparte con un'altra animazione Murena
                        if (cascadeX > canvas.width || cascadeY > canvas.height) {
                            cascadeX = Math.random() * (canvas.width / 2);
                            cascadeY = Math.random() * (canvas.height / 2) - 100;
                            targetGlitchImg = murenaImages[Math.floor(Math.random() * murenaImages.length)];
                        }
                    }
                }
            } else {
                glitchArray = []; // Pulisce alla fine dell'evento
            }
        }

        function drawGlitchEvent() {
            if (glitchArray.length === 0 || !targetGlitchImg) return;

            let col = spriteAnimFrame % 5;
            let row = Math.floor(spriteAnimFrame / 5);

            ctx.globalAlpha = 0.9;
            ctx.shadowBlur = 15;
            ctx.shadowColor = "#ff00ff"; // Glow magenta violento ma su sfondo nero

            glitchArray.forEach(p => {
                ctx.drawImage(targetGlitchImg, col * 256, row * 256, 256, 256, p.x, p.y, 256, 256);
            });
            
            ctx.shadowBlur = 0;
            ctx.globalAlpha = 1;
        }

        function animazione() {
            // Fondo Nero con traccia
            ctx.fillStyle = 'rgba(0, 0, 0, 0.25)'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            updateLogo();
            
            murena.update();
            murena.draw();
            drawLogo();

            triggerGlobalGlitch();
            drawGlitchEvent();

            requestAnimationFrame(animazione);
        }

        animazione();

    </script>
</body>
</html>
